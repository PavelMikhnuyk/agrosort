version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agrosort_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrosort
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: agrosort_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agrosort
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: agrosort_super_secret_key_change_in_prod
      JWT_EXPIRES: 7d
      FRONTEND_PATH: /app/frontend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend

volumes:
  pgdata:
