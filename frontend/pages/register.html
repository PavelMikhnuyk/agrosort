<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — AgroSort</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-logo">Agro<span>Sort</span></div>
    <div class="auth-subtitle">Создать аккаунт</div>
    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>
    <div class="form-group">
      <label class="form-label">ФИО *</label>
      <input class="form-input" type="text" id="name" placeholder="Иванов Иван Иванович">
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input class="form-input" type="email" id="email" placeholder="your@email.by">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль *</label>
      <input class="form-input" type="password" id="password" placeholder="Минимум 8 символов">
    </div>
    <div class="form-group">
      <label class="form-label">Организация</label>
      <input class="form-input" type="text" id="organization" placeholder="КФХ, ООО, НИИ...">
    </div>
    <div class="form-group">
      <label class="form-label">Область</label>
      <select class="form-select" id="region">
        <option value="">Выберите область</option>
        <option>Брестская</option>
        <option>Витебская</option>
        <option>Гомельская</option>
        <option>Гродненская</option>
        <option>Могилёвская</option>
        <option>Минская</option>
      </select>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="register()">Зарегистрироваться</button>
    <div class="auth-link">Уже есть аккаунт? <a href="/pages/login.html">Войти</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
if (isLoggedIn()) window.location.href = '/pages/dashboard.html';

async function register() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const organization = document.getElementById('organization').value.trim();
  const region = document.getElementById('region').value;
  const err = document.getElementById('formError');
  const succ = document.getElementById('formSuccess');
  const btn = document.getElementById('submitBtn');

  err.style.display = 'none'; succ.style.display = 'none';
  if (!name || !email || !password) { err.textContent = 'Заполните обязательные поля'; err.style.display = 'block'; return; }
  if (password.length < 8) { err.textContent = 'Пароль должен быть не менее 8 символов'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Регистрация...';
  try {
    const res = await api.post('/auth/register', { name, email, password, organization, region });
    setAuth(res.token, res.user);
    window.location.href = '/pages/dashboard.html';
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Зарегистрироваться';
  }
}
</script>
</body>
</html>
