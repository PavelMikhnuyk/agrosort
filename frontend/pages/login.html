<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — AgroSort</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Agro<span>Sort</span></div>
    <div class="auth-subtitle">Вход в личный кабинет</div>
    <div class="form-error" id="formError"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="your@email.by" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="submitBtn" onclick="login()">Войти</button>
    <div class="auth-link">Нет аккаунта? <a href="/pages/register.html">Зарегистрироваться</a></div>
    <div style="margin-top:1rem;padding:1rem;background:#f5f2ea;border-radius:6px;font-size:.78rem;color:var(--gray)">
      <strong>Тестовый вход:</strong><br>
      admin@agrosort.by / Admin123!<br>
      agronomist@agrosort.by / Agro123!
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
if (isLoggedIn()) window.location.href = '/pages/dashboard.html';

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('formError');
  const btn = document.getElementById('submitBtn');

  err.style.display = 'none';
  if (!email || !password) { err.textContent = 'Заполните все поля'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Входим...';
  try {
    const res = await api.post('/auth/login', { email, password });
    setAuth(res.token, res.user);
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/pages/dashboard.html';
    window.location.href = redirect;
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Войти';
  }
}
</script>
</body>
</html>
